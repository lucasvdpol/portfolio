<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Lucas van de Pol</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .back-container {
      padding: 2rem 5% 0;
      width: 100%;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .detail-section {
      padding: 2rem 5% 6rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .back-link:hover {
      color: var(--blue);
    }

    .detail-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }

    .detail-thumb svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .detail-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.1;
    }



    .detail-body p {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 1rem;
      max-width: 680px;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 2rem 0;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .meta-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .meta-val {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .meta-val.blue {
      color: var(--blue);
    }

    .detail-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    /* Not found state */
    .not-found {
      padding: 6rem 5%;
      text-align: center;
      color: var(--muted);
    }

    .not-found h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
  </style>
</head>

<body>

  <nav>
    <a class="nav-logo" href="index.html"><span>PORT</span>FOLIO</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html" class="active">Projecten</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-content">
    <div id="detailContent"></div>
  </div>

  <footer>
    <p>© 2026 Lucas van de Pol — Portfolio</p>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="projects.html">Projecten</a>
      <a href="contact.html">Contact</a>
    </div>
  </footer>

  <script src="projects-data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const p = projects.find(proj => proj.id === id);
    const container = document.getElementById('detailContent');

    if (!p) {
      container.innerHTML = `
      <div class="not-found">
        <h2>Project niet gevonden</h2>
        <p>Dit project bestaat niet of is verwijderd.</p>
        <a class="btn btn-ghost" href="projects.html" style="margin-top:1.5rem; display:inline-flex;">← Terug naar overzicht</a>
      </div>`;
    } else {
      document.title = `${p.title} — Lucas van de Pol`;

      // Zoek dit stukje in je script (onder de detail-actions) en vervang het:

      const isMobileApp = p.tags.includes('Flutter') || p.tags.includes('App');
      const galleryClass = isMobileApp ? 'project-gallery mobile-screens' : 'project-gallery';
      const itemClass = isMobileApp ? 'gallery-item phone-mockup' : 'gallery-item';

      container.innerHTML = `
  <div class="back-container">
    <a class="back-link" href="projects.html">← Terug naar projecten</a>
  </div>
  <div class="detail-section">
    <div class="detail-thumb">
      ${makeThumbnailSVG(p, 900, 400)}
    </div>

    <div class="detail-body">
      <div class="project-tags" style="margin-bottom:1rem;">
        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>

      <h1 class="detail-title">${p.title}</h1>
      <p><strong style="color:var(--text);">${p.short}</strong></p>
      
      <div id="project-description-container" class="detail-body-text">
        <p style="opacity: 0.5;">Laden...</p>
      </div>

     <div class="detail-meta">
            <div class="meta-item">
              <span class="meta-label">Jaar</span>
              <span class="meta-val">${p.year}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Rol</span>
              <span class="meta-val">${p.role}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Status</span>
              <span class="meta-val blue">${p.status}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Skills</span>
              <span class="meta-val">${p.tags.join(', ')}</span>
            </div>
      </div> 

      <div class="detail-actions">
        ${p.live ? `<a class="btn btn-primary" href="${p.live}" target="_blank">Live bekijken ↗</a>` : ''}
        ${p.playstore ? `<a class="btn btn-primary" href="${p.playstore}" target="_blank">Play Store ↗</a>` : ''}
        ${p.appstore ? `<a class="btn btn-primary" href="${p.appstore}" target="_blank">App Store ↗</a>` : ''}
      </div>

      <!-- DE NIEUWE GALLERY LOGICA -->
      <div class="${galleryClass}" style="margin-top: 3rem;">
        ${p.screenshots ? p.screenshots.map(img => `
          <div class="${itemClass}">
            <img src="${img}" alt="Screenshot" onclick="openModal(this.src)">
          </div>
        `).join('') : ''}
      </div>
    </div>
  </div>`;

      // 3. NU pas gaan we de tekst ophalen en in de container stoppen
      const longDescContainer = document.getElementById('project-description-container');

      if (p.descriptionFile) {
        fetch(p.descriptionFile)
          .then(response => {
            if (!response.ok) throw new Error("Bestand niet gevonden");
            return response.text();
          })
          .then(text => {
            // Gebruik .innerText als het platte tekst is, 
            // of .innerHTML als je HTML-tags (zoals <h3>) in je .txt bestand hebt staan.
            longDescContainer.innerHTML = text;
          })
          .catch(err => {
            console.error(err);
            longDescContainer.innerHTML = `<p>${p.long}</p>`; // Fallback bij fout
          });
      } else {
        longDescContainer.innerHTML = `<p>${p.long}</p>`; // Gewone weergave als er geen file is
      }
    }

    function toggleMenu() { document.getElementById('navLinks').classList.toggle('open'); }
  </script>
</body>

</html>

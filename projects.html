<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projecten — Lucas van de Pol</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-hero {
      padding: 5rem 5% 3rem;
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, #4a6cf720, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
    }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .filter-tab {
      padding: 7px 18px;
      border-radius: 4px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
    }
    .filter-tab:hover { border-color: var(--blue); color: var(--blue); }
    .filter-tab.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* Count badge */
    .project-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .project-count span { color: var(--blue); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><span>PORT</span>FOLIO</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html" class="active">Projecten</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="page-content">

  <div class="page-hero">
    <div class="section-label">Overzicht</div>
    <div class="section-title">Mijn Projecten</div>
    <div class="divider"></div>
    <p class="section-desc">
      Een overzicht van alles wat ik heb gemaakt. Van apps tot tools — elk project is een leerervaring.
    </p>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterProjects('all', this)">Alles</button>
      <button class="filter-tab" onclick="filterProjects('Frontend', this)">Frontend</button>
      <button class="filter-tab" onclick="filterProjects('Backend', this)">Backend</button>
      <button class="filter-tab" onclick="filterProjects('Fullstack', this)">Fullstack</button>
    </div>

    <div class="project-count">Toont <span id="countNum">3</span> projecten</div>
    <div class="projects-grid" id="projectGrid"></div>
  </div>

</div>

<footer>
  <p>© 2026 Lucas van de Pol — Portfolio</p>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="projects.html">Projecten</a>
    <a href="contact.html">Contact</a>
  </div>
</footer>

<script src="projects-data.js"></script>
<script>
  function renderProjects(list) {
    document.getElementById('projectGrid').innerHTML = list.map(projectCard).join('');
    document.getElementById('countNum').textContent = list.length;
  }

  function filterProjects(filter, btn) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const filtered = filter === 'all'
      ? projects
      : projects.filter(p => p.role.toLowerCase().includes(filter.toLowerCase()));
    renderProjects(filtered);
  }

  // Initial render
  renderProjects(projects);

  function toggleMenu() { document.getElementById('navLinks').classList.toggle('open'); }
</script>
</body>
</html>
